{{- /* Inline SVG icons (replaces Font Awesome 4).
       Usage: partial "icon.html" (dict "name" "menu" "class" "...") */ -}}
{{- $name := .name -}}
{{- $class := .class | default "" -}}
<svg class="{{ $class }}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
  {{- if eq $name "menu" -}}
    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
  {{- else if eq $name "mail" -}}
    <rect x="2.5" y="5" width="19" height="14" rx="2"/><path d="m3.5 6.5 8.5 6.5 8.5-6.5"/>
  {{- else if eq $name "facebook" -}}
    <path d="M14 3h3v3.5h-2.2c-.7 0-1 .4-1 1.1V10H17l-.5 3.4h-2.7V21h-3.6v-7.6H7.5V10h2.7V7.2C10.2 4.6 11.6 3 14 3Z" fill="currentColor" stroke="none"/>
  {{- else if eq $name "soundcloud" -}}
    <path d="M4 17v-5"/><path d="M7 17V9.5"/><path d="M10 17V8"/><path d="M13 17V7.5c2.8-1 5 .4 5.6 2.7A3.3 3.3 0 0 1 18 17z" fill="currentColor" stroke="none"/><path d="M13 17V7.5c2.8-1 5 .4 5.6 2.7A3.3 3.3 0 0 1 18 17H13Z"/>
  {{- else if eq $name "mixcloud" -}}
    <circle cx="12" cy="12" r="8.5"/><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/><path d="M12 3.5a8.5 8.5 0 0 1 8.5 8.5"/>
  {{- else if eq $name "rss" -}}
    <path d="M4 11a9 9 0 0 1 9 9"/><path d="M4 4a16 16 0 0 1 16 16"/><circle cx="5" cy="19" r="1.6" fill="currentColor" stroke="none"/>
  {{- else if eq $name "calendar" -}}
    <rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/>
  {{- else -}}
    <circle cx="12" cy="12" r="9"/><line x1="12" y1="8" x2="12" y2="13"/><circle cx="12" cy="16.5" r="0.5" fill="currentColor"/>
  {{- end -}}
</svg>
