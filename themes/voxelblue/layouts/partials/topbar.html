{{- /* Sticky menu bar, visible <992px. The ONE place the nav toggle
       lives (used to be duplicated in every content template). */ -}}
<div class="topbar">
  <button
    type="button"
    id="nav-toggle"
    class="nav-toggle"
    aria-expanded="false"
    aria-controls="sidebar"
  >
    {{ partial "icon.html" (dict "name" "menu") }} menu
  </button>
  <a class="topbar-brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
</div>
