baseURL = "https://voxel.blue/"
languageCode = "en-us"
title = "voxel.blue"
theme = "voxelblue"
Title = "voxel.blue"
enableRobotsTXT = true

# The about/contact pages embed raw HTML in their markdown.
[markup]
  [markup.goldmark.renderer]
    unsafe = true

# The gig calendar: content/dates/calendar.md declares `outputs: [calendar]`
# and renders through layouts/dates/single.ics.
[mediaTypes."text/calendar"]
  suffixes = ["ics"]

[outputFormats.Calendar]
  mediaType = "text/calendar"
  isPlainText = true

# Make the synced mix covers reachable by Hugo's image processing
# (resize + blurred placeholders at build time).
[module]
  [[module.mounts]]
    source = "static/images/mixes"
    target = "assets/images/mixes"

[Params]
  # Style options: default (pink), blue, green, pink, red, sea, violet
  # Use custom.css for your custom styling
  style = "voxel"
  description = "Twilight, Darkpsy, Hi-Tech, Psytrance, Zenonesque, Psychill, Psybreaks & Ambient DJ from Dresden"
  # Rendered as "©<current year> <copyright>" in the sidebar.
  copyright = "voxel.blue"
  sidebarAbout = [
    "From Ambient, Psychill to darkpsy, psycore and hi-tech - Psy without borders.",
    "DJ from Dresden, Germany",
  ]
  # Contact page
     # Since this template is static, the contact form uses www.formspree.io as a
     # proxy. The form makes a POST request to their servers to send the actual
     # email. Visitors can send up to a 1000 emails each month for free.
     #
     # What you need to do for the setup?
     #
     # - set your email address under 'email' below
     # - upload the generated site to your server
     # - send a dummy email yourself to confirm your account
     # - click the confirm link in the email from www.formspree.io
     # - you're done. Happy mailing!
  email = "contact@voxel.blue"

  # Nav links in the side bar
  # [[Params.navlinks]]
  # name = "About"
  # url = "about/"

  [[Params.navlinks]]
  name = "Get inspired"
  url = "get_inspired/"

  [[Params.navlinks]]
  name = "Get in touch"
  url = "contact/"

  [Params.social]
  facebook      = "https://facebook.com/the.voxel.blue/"
#  googleplus    = "full profile url in googleplus"
  soundcloud    = "http://soundcloud.com/voxel-blue"
  mixcloud    = "http://mixcloud.com/voxel_blue"
  email         = "contact@voxel.blue"
#  twitter       = "full profile url in twitter"
#  linkedin      = "full profile url in linkedin"
#  stackoverflow = "full profile url in stackoverflow"
#  instagram     = "full profile url in instagram"
#  github        = "full profile url in github"
